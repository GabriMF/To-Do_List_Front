<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1 class="appName">To-Do List</h1>
        
        <!-- Botón logout -->
        <div class="userSide">
            <span id="userName" style="display:none;"></span>
            <button id="logoutButton" style="display:none;">Cerrar sesión</button>
        </div>
    </header>

    <!-- ================= Login ================= -->
    <div id="login-container">
        <h2>Iniciar sesión</h2>

        <label for="loginUser">Usuario:</label>
        <input type="text" id="loginUser">

        <label for="loginPass">Contraseña:</label>
        <input type="password" id="loginPass">

        <button id="loginButton">Iniciar sesión</button>
        <span id="mensajeLogin" class="error"></span>
    </div>

    

    <!-- ================= Aplicación ================= -->
    <div id="app" style="display:none;">
        <div class="container">

            <!-- ========== Formulario ========== -->
            <div class="form-section">
                <h2>Nueva tarea</h2>

                <form id="form-tarea">

                    <label for="tituloTarea">Título:</label>
                    <input type="text" id="tituloTarea">

                    <label for="descripcionTarea">Descripción:</label>
                    <input type="text" id="descripcionTarea">

                    <label for="fechaLimiteTarea">Fecha límite (opcional):</label>
                    <input type="datetime-local" id="fechaLimiteTarea">

                    <button type="submit">Crear tarea</button>
                </form>
                <p id="mensajeTarea" class="error"></p>
            </div>

            <!-- ========== Lista de Tareas ========== -->
            <div class="list-section">
                <h2>Listado de tareas</h2>

                <button id="loadTasksButton">Cargar tareas</button>
                <ul id="lista-tareas"></ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
